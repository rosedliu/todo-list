<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 15px;
      max-width: 560px;
      margin: 64px auto;
      padding: 0 28px;
      background: #fff;
      color: #1a1a1a;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 30px;
      text-align: center;
      letter-spacing: 0.02em;
      margin: 0 0 40px;
    }

    #input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: flex-end;
    }

    #task-input, #section-select {
      padding: 6px 0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      border: none;
      border-bottom: 1px solid #1a1a1a;
      border-radius: 0;
      background: transparent;
      color: #1a1a1a;
      outline: none;
    }
    #task-input { flex: 1; }
    #task-input::placeholder { color: #777; }
    #section-select { cursor: pointer; }
    #section-select:focus { outline: none; }

    button {
      padding: 6px 14px;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid #1a1a1a;
      border-radius: 0;
      background: transparent;
      color: #1a1a1a;
      transition: background 0.15s, color 0.15s;
    }
    button:hover { background: #1a1a1a; color: #fff; }

    #import-section { margin-top: 28px; }
    #import-section details summary {
      cursor: pointer;
      color: #1a1a1a;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
      list-style: none;
    }
    #import-section details summary::-webkit-details-marker { display: none; }
    #bulk-input {
      width: 100%;
      height: 96px;
      padding: 8px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      border: 1px solid #ddd;
      border-radius: 0;
      resize: vertical;
      background: transparent;
      outline: none;
      color: #1a1a1a;
    }
    #import-btn { margin-top: 8px; }

    .section {
      margin-bottom: 0;
      border: none;
      border-top: 1px solid #e8e8e8;
      border-radius: 0;
      overflow: visible;
    }
    .section:last-of-type { border-bottom: 1px solid #e8e8e8; }

    .section-header {
      display: flex;
      align-items: center;
      background: #a8d4a0;
      padding: 10px 12px;
      gap: 8px;
    }

    .section-drag-handle {
      color: #888;
      cursor: grab;
      font-size: 12px;
      letter-spacing: -2px;
      user-select: none;
      flex-shrink: 0;
    }
    .section-drag-handle:hover { color: #1a1a1a; }

    .section.dragging { opacity: 0.3; }
    .section.drag-over { border-top: 1px solid #1a1a1a; }

    .section-toggle {
      cursor: pointer;
      font-size: 10px;
      color: #1a1a1a;
      user-select: none;
      width: 14px;
      flex-shrink: 0;
    }

    .section-name {
      flex: 1;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    .section-name-input {
      flex: 1;
      font-size: 11px;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 0;
      border: none;
      border-bottom: 1px solid #1a1a1a;
      background: transparent;
      color: #1a1a1a;
      outline: none;
    }

    .rename-btn, .delete-section-btn {
      border: none;
      font-size: 10px;
      padding: 2px 6px;
      color: #1a1a1a;
      background: transparent;
      letter-spacing: 0.08em;
    }
    .rename-btn:hover, .delete-section-btn:hover {
      background: transparent;
      color: #1a1a1a;
      border: none;
    }

    .section-body { padding: 0; min-height: 4px; }
    .section-body.collapsed { display: none; }
    .section-body.drop-target { background: #edf7eb; }
    .section-header.drop-target { background: #90c488; }

    ul { list-style: none; padding: 0; margin: 0; }

    li {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f2f2f2;
    }
    li:last-child { border-bottom: none; }
    li.dragging { opacity: 0.3; }
    li.drag-over { border-top: 1px solid #1a1a1a; }
    li.done .task-text { text-decoration: line-through; color: #888; }

    .drag-handle {
      color: #888;
      margin-right: 8px;
      cursor: grab;
      font-size: 13px;
      user-select: none;
      flex-shrink: 0;
      padding-top: 3px;
    }
    .drag-handle:hover { color: #1a1a1a; }

    .task-checkbox {
      -webkit-appearance: none;
      appearance: none;
      width: 13px;
      height: 13px;
      border: 1px solid #1a1a1a;
      border-radius: 0;
      margin-right: 10px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 4px;
      background: transparent;
      position: relative;
    }
    .task-checkbox:checked { border-color: #1a1a1a; }
    .task-checkbox:checked::after {
      content: '';
      position: absolute;
      top: 0px;
      left: 3px;
      width: 4px;
      height: 7px;
      border: 1px solid #1a1a1a;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .task-text {
      flex: 1;
      word-break: break-word;
      padding-right: 12px;
      font-size: 15px;
      line-height: 1.45;
    }

    .btn-group {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 2px;
    }

    .edit-btn, .save-btn, .delete-btn {
      border: none;
      font-size: 10px;
      padding: 3px 6px;
      color: #1a1a1a;
      background: transparent;
      letter-spacing: 0.08em;
    }
    .edit-btn:hover, .save-btn:hover, .delete-btn:hover {
      color: #1a1a1a;
      background: transparent;
      border: none;
    }

    .edit-input {
      flex: 1;
      padding: 3px 0;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      border: none;
      border-bottom: 1px solid #1a1a1a;
      border-radius: 0;
      background: transparent;
      margin-right: 8px;
      outline: none;
      color: #1a1a1a;
    }

    #add-section-btn {
      display: block;
      width: 100%;
      background: transparent;
      color: #1a1a1a;
      border: none;
      border-top: 1px dashed #999;
      border-radius: 0;
      padding: 12px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 0;
    }
    #add-section-btn:hover { color: #1a1a1a; background: transparent; border-color: #bbb; border-style: dashed; }

    #undo-btn {
      display: none;
      margin: 0 auto 20px;
      background: transparent;
      font-size: 10px;
      padding: 5px 14px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <h1>To-Do List</h1>
  <button id="undo-btn" onclick="undo()">↩ Undo</button>
  <div id="input-area">
    <input type="text" id="task-input" placeholder="Add a new task..." />
    <select id="section-select"></select>
    <button onclick="addTask()">Add</button>
  </div>
  <div id="sections-container"></div>
  <div id="import-section">
    <details>
      <summary>Import tasks from Google Doc (paste text)</summary>
      <textarea id="bulk-input" placeholder="Paste lines from your Google Doc — one task per line"></textarea>
      <button id="import-btn" onclick="importTasks()">Import</button>
    </details>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCKCWEfFbKd_dv-HoerMflscdDam1hV2gk",
      authDomain: "todo-list-17c1d.firebaseapp.com",
      projectId: "todo-list-17c1d",
      storageBucket: "todo-list-17c1d.firebasestorage.app",
      messagingSenderId: "467324541020",
      appId: "1:467324541020:web:8e586f4b21f62d76d96e99"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const stateRef = doc(db, 'todo', 'state');

    const taskInput = document.getElementById('task-input');
    const sectionSelect = document.getElementById('section-select');
    const container = document.getElementById('sections-container');

    // Expose functions used in onclick attributes
    window.addTask = addTask;
    window.addSection = addSection;
    window.importTasks = importTasks;

    const COMPLETED_ID = '__completed__';
    let state = { sections: [], tasks: [] };
    let draggedTaskId = null;
    let draggedSectionId = null;
    let isSaving = false;
    let previousState = null;

    function snapshot() {
      previousState = JSON.parse(JSON.stringify(state));
      document.getElementById('undo-btn').style.display = 'block';
    }

    function undo() {
      if (!previousState) return;
      state = previousState;
      previousState = null;
      document.getElementById('undo-btn').style.display = 'none';
      save();
      render();
    }

    window.undo = undo;

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    async function save() {
      isSaving = true;
      await setDoc(stateRef, state);
      isSaving = false;
    }

    function ensureCompletedSection() {
      let completed = state.sections.find(s => s.id === COMPLETED_ID);
      if (!completed) {
        completed = { id: COMPLETED_ID, name: 'Completed', collapsed: true };
        state.sections.push(completed);
      }
      state.sections = [...state.sections.filter(s => s.id !== COMPLETED_ID), completed];
    }

    function load() {
      onSnapshot(stateRef, (snap) => {
        if (isSaving) return;
        if (snap.exists()) {
          state = snap.data();
        } else {
          state = {
            sections: [{ id: uid(), name: 'General', collapsed: false }],
            tasks: []
          };
        }
        ensureCompletedSection();
        render();
      });
    }

    function render() {
      container.innerHTML = '';
      const nonCompleted = state.sections.filter(s => s.id !== COMPLETED_ID);
      const completed = state.sections.find(s => s.id === COMPLETED_ID);
      nonCompleted.forEach(sec => renderSection(sec));
      const addBtn = document.createElement('button');
      addBtn.id = 'add-section-btn';
      addBtn.textContent = '+ Add Section';
      addBtn.onclick = addSection;
      container.appendChild(addBtn);
      if (completed) renderSection(completed);
      refreshSectionSelect();
    }

    function renderSection(sec) {
      const section = document.createElement('div');
      section.className = 'section';
      section.dataset.id = sec.id;

      if (sec.id !== COMPLETED_ID) {
        section.addEventListener('dragstart', e => {
          if (!draggedSectionId) return; // only proceed if handle initiated this
          setTimeout(() => section.classList.add('dragging'), 0);
        });
        section.addEventListener('dragend', () => {
          section.draggable = false;
          draggedSectionId = null;
          section.classList.remove('dragging');
          document.querySelectorAll('.section').forEach(s => s.classList.remove('drag-over'));
        });
        section.addEventListener('dragover', e => {
          if (!draggedSectionId || draggedSectionId === sec.id) return;
          e.preventDefault();
          e.stopPropagation();
          document.querySelectorAll('.section').forEach(s => s.classList.remove('drag-over'));
          section.classList.add('drag-over');
        });
        section.addEventListener('dragleave', e => {
          if (!section.contains(e.relatedTarget)) section.classList.remove('drag-over');
        });
        section.addEventListener('drop', e => {
          if (!draggedSectionId || draggedSectionId === sec.id) return;
          e.preventDefault();
          e.stopPropagation();
          section.classList.remove('drag-over');
          const fromIdx = state.sections.findIndex(s => s.id === draggedSectionId);
          const toIdx = state.sections.findIndex(s => s.id === sec.id);
          const [moved] = state.sections.splice(fromIdx, 1);
          state.sections.splice(toIdx, 0, moved);
          ensureCompletedSection();
          save();
          render();
        });
      }

      // Header
      const header = document.createElement('div');
      header.className = 'section-header';

      const toggle = document.createElement('span');
      toggle.className = 'section-toggle';
      toggle.textContent = sec.collapsed ? '▸' : '▾';
      toggle.onclick = () => {
        sec.collapsed = !sec.collapsed;
        save();
        toggle.textContent = sec.collapsed ? '▸' : '▾';
        body.classList.toggle('collapsed', sec.collapsed);
      };

      const nameEl = document.createElement('span');
      nameEl.className = 'section-name';
      nameEl.textContent = sec.name;

      const renameBtn = document.createElement('button');
      renameBtn.textContent = 'Rename';
      renameBtn.className = 'rename-btn';
      renameBtn.onclick = () => {
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'section-name-input';
        input.value = sec.name;
        const doSave = () => {
          const val = input.value.trim();
          if (val) sec.name = val;
          save();
          nameEl.textContent = sec.name;
          input.replaceWith(nameEl);
          renameBtn.textContent = 'Rename';
          refreshSectionSelect();
        };
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') doSave();
          if (e.key === 'Escape') { input.replaceWith(nameEl); renameBtn.textContent = 'Rename'; }
        });
        renameBtn.textContent = 'Save';
        renameBtn.onclick = doSave;
        nameEl.replaceWith(input);
        input.focus();
      };

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.className = 'delete-section-btn';
      deleteBtn.onclick = () => {
        if (state.sections.length === 1) { alert('You need at least one section.'); return; }
        state.sections = state.sections.filter(s => s.id !== sec.id);
        state.tasks = state.tasks.filter(t => t.sectionId !== sec.id);
        save();
        render();
      };

      if (sec.id !== COMPLETED_ID) {
        const sectionHandle = document.createElement('span');
        sectionHandle.className = 'section-drag-handle';
        sectionHandle.textContent = '⋮⋮';
        sectionHandle.addEventListener('mousedown', () => {
          section.draggable = true;
          draggedSectionId = sec.id;
        });
        sectionHandle.addEventListener('mouseup', () => {
          section.draggable = false;
        });
        header.appendChild(sectionHandle);
      }
      header.appendChild(toggle);
      header.appendChild(nameEl);
      if (sec.id !== COMPLETED_ID) {
        header.appendChild(renameBtn);
        header.appendChild(deleteBtn);
      }

      // Accept task drops on the header
      header.addEventListener('dragover', e => {
        if (!draggedTaskId) return;
        e.preventDefault();
        e.stopPropagation();
        header.classList.add('drop-target');
      });
      header.addEventListener('dragleave', () => header.classList.remove('drop-target'));
      header.addEventListener('drop', e => {
        if (!draggedTaskId) return;
        e.preventDefault();
        e.stopPropagation();
        header.classList.remove('drop-target');
        const task = state.tasks.find(t => t.id === draggedTaskId);
        if (task && task.sectionId !== sec.id) {
          task.sectionId = sec.id;
          save();
          render();
        }
      });

      // Body
      const body = document.createElement('div');
      body.className = 'section-body' + (sec.collapsed ? ' collapsed' : '');

      const ul = document.createElement('ul');
      ul.dataset.sectionId = sec.id;

      state.tasks.filter(t => t.sectionId === sec.id).forEach(task => {
        ul.appendChild(renderTask(task));
      });

      // Drop onto empty section
      body.addEventListener('dragover', e => { if (draggedSectionId) return; e.preventDefault(); body.classList.add('drop-target'); });
      body.addEventListener('dragleave', () => body.classList.remove('drop-target'));
      body.addEventListener('drop', e => {
        e.preventDefault();
        body.classList.remove('drop-target');
        if (draggedSectionId) return;
        if (draggedTaskId) {
          const task = state.tasks.find(t => t.id === draggedTaskId);
          if (task && task.sectionId !== sec.id) {
            task.sectionId = sec.id;
            save();
            render();
          }
        }
      });

      body.appendChild(ul);
      section.appendChild(header);
      section.appendChild(body);
      container.appendChild(section);
    }

    function renderTask(task) {
      const li = document.createElement('li');
      li.dataset.id = task.id;
      if (task.done) li.classList.add('done');

      const handle = document.createElement('span');
      handle.className = 'drag-handle';
      handle.textContent = '⠿';
      handle.addEventListener('mousedown', () => { li.draggable = true; });
      handle.addEventListener('mouseup', () => { li.draggable = false; });

      li.addEventListener('dragstart', e => {
        draggedTaskId = task.id;
        setTimeout(() => li.classList.add('dragging'), 0);
      });
      li.addEventListener('dragend', () => {
        li.draggable = false;
        draggedTaskId = null;
        li.classList.remove('dragging');
        document.querySelectorAll('li').forEach(i => i.classList.remove('drag-over'));
        document.querySelectorAll('.section-body').forEach(b => b.classList.remove('drop-target'));
      });
      li.addEventListener('dragover', e => {
        e.preventDefault();
        e.stopPropagation();
        document.querySelectorAll('li').forEach(i => i.classList.remove('drag-over'));
        li.classList.add('drag-over');
      });
      li.addEventListener('drop', e => {
        e.preventDefault();
        e.stopPropagation();
        li.classList.remove('drag-over');
        if (!draggedTaskId || draggedTaskId === task.id) return;
        const fromIndex = state.tasks.findIndex(t => t.id === draggedTaskId);
        const toIndex = state.tasks.findIndex(t => t.id === task.id);
        const [moved] = state.tasks.splice(fromIndex, 1);
        moved.sectionId = task.sectionId;
        state.tasks.splice(toIndex, 0, moved);
        save();
        render();
      });

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'task-checkbox';
      checkbox.checked = task.done;
      checkbox.onclick = (e) => {
        e.stopPropagation();
        snapshot();
        if (task.sectionId === COMPLETED_ID) {
          task.done = false;
          const dest = task.originalSectionId &&
            state.sections.find(s => s.id === task.originalSectionId && s.id !== COMPLETED_ID)
              ? task.originalSectionId
              : state.sections.find(s => s.id !== COMPLETED_ID)?.id;
          task.sectionId = dest;
          delete task.originalSectionId;
        } else {
          task.done = true;
          task.originalSectionId = task.sectionId;
          task.sectionId = COMPLETED_ID;
        }
        save();
        render();
      };

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = task.text;

      const btnGroup = document.createElement('div');
      btnGroup.className = 'btn-group';

      const edit = document.createElement('button');
      edit.textContent = 'Edit';
      edit.className = 'edit-btn';
      edit.onclick = () => {
        const editInput = document.createElement('input');
        editInput.type = 'text';
        editInput.className = 'edit-input';
        editInput.value = task.text;

        const save2 = document.createElement('button');
        save2.textContent = 'Save';
        save2.className = 'save-btn';

        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = 'Cancel';
        cancelBtn.className = 'edit-btn';
        cancelBtn.style.marginRight = '6px';

        const doSave = () => {
          const val = editInput.value.trim();
          if (val) { task.text = val; span.textContent = val; }
          save();
          li.replaceChild(span, editInput);
          btnGroup.replaceChild(edit, save2);
          btnGroup.removeChild(cancelBtn);
        };
        cancelBtn.onclick = () => {
          li.replaceChild(span, editInput);
          btnGroup.replaceChild(edit, save2);
          btnGroup.removeChild(cancelBtn);
        };
        save2.onclick = doSave;
        editInput.addEventListener('keydown', e => {
          if (e.key === 'Enter') doSave();
          if (e.key === 'Escape') cancelBtn.onclick();
        });
        li.replaceChild(editInput, span);
        btnGroup.replaceChild(save2, edit);
        btnGroup.insertBefore(cancelBtn, del);
        editInput.focus();
      };

      const del = document.createElement('button');
      del.textContent = 'Delete';
      del.className = 'delete-btn';
      del.onclick = () => {
        state.tasks = state.tasks.filter(t => t.id !== task.id);
        save();
        li.remove();
      };

      btnGroup.appendChild(edit);
      btnGroup.appendChild(del);
      li.appendChild(handle);
      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(btnGroup);
      return li;
    }

    function refreshSectionSelect() {
      const current = sectionSelect.value;
      sectionSelect.innerHTML = '';
      state.sections.filter(s => s.id !== COMPLETED_ID).forEach(sec => {
        const opt = document.createElement('option');
        opt.value = sec.id;
        opt.textContent = sec.name;
        sectionSelect.appendChild(opt);
      });
      if (current && state.sections.find(s => s.id === current)) {
        sectionSelect.value = current;
      }
    }

    function addSection(name = 'New Section') {
      const sec = { id: uid(), name, collapsed: false };
      // Insert before Completed
      const completedIdx = state.sections.findIndex(s => s.id === COMPLETED_ID);
      state.sections.splice(completedIdx, 0, sec);
      save();
      render();
      sectionSelect.value = sec.id;
    }

    function addTask(text) {
      text = text ?? taskInput.value.trim();
      if (!text) return;
      const sectionId = sectionSelect.value;
      if (!sectionId) return;
      const task = { id: uid(), sectionId, text, done: false };
      const firstInSection = state.tasks.findIndex(t => t.sectionId === sectionId);
      if (firstInSection === -1) state.tasks.push(task);
      else state.tasks.splice(firstInSection, 0, task);
      save();
      const ul = document.querySelector(`ul[data-section-id="${sectionId}"]`);
      if (ul) ul.insertBefore(renderTask(task), ul.firstChild);
      taskInput.value = '';
      taskInput.focus();
    }

    function importTasks() {
      const bulk = document.getElementById('bulk-input');
      const generalSection = state.sections.find(s => s.name === 'General' && s.id !== COMPLETED_ID);
      const targetId = generalSection ? generalSection.id : state.sections.find(s => s.id !== COMPLETED_ID)?.id;
      const prevSelected = sectionSelect.value;
      sectionSelect.value = targetId;
      bulk.value.split('\n').map(l => l.trim()).filter(l => l).forEach(line => addTask(line));
      sectionSelect.value = prevSelected;
      bulk.value = '';
    }

    taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    load();
  </script>
</body>
</html>
